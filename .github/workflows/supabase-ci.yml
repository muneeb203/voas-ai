name: supabase-ci

on:
  pull_request:
    paths:
      - 'supabase/**'
      - '.github/workflows/supabase-ci.yml'

concurrency:
  group: supabase-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-migrations:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Bootstrap auth schema stub
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d postgres -c "create schema if not exists auth;"
          psql -h localhost -U postgres -d postgres -c "create table if not exists auth.users (id uuid primary key default gen_random_uuid(), created_at timestamptz default now());"
          psql -h localhost -U postgres -d postgres -c "create or replace function auth.uid() returns uuid language sql stable as \$\$ select null::uuid \$\$;"

      - name: Apply migrations in order
        env:
          PGPASSWORD: postgres
        run: |
          for f in supabase/migrations/*.sql; do
            echo "Applying $f"
            psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 -f "$f"
          done
