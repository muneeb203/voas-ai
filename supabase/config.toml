# Supabase local dev configuration.
# Run `supabase start` to boot the stack. Run `supabase db reset` to apply migrations + seed.
# Docs: https://supabase.com/docs/guides/cli/local-development#configuration

project_id = "voas-ai"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = true
port = 54323
api_url = "http://localhost:54321"

[inbucket]
enabled = true
port = 54324

# Disable on Windows unless Docker exposes tcp://localhost:2375 (see docs/supabase-local-windows.md).
[analytics]
enabled = false

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3001"
additional_redirect_urls = ["http://localhost:3001/**"]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
otp_expiry = 3600

[auth.email.template.recovery]
subject = "Reset your VOAS AI password"
content_path = "./supabase/templates/recovery.html"

# Google OAuth — see docs/auth-google-setup.md
# Secrets live in supabase/.env (copy from supabase/.env.example).
[auth.external.google]
enabled = true
client_id = "env(SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID)"
secret = "env(SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_SECRET)"
redirect_uri = "http://localhost:54321/auth/v1/callback"
url = ""
skip_nonce_check = false

[experimental]
orioledb_version = ""
